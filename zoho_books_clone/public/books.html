<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lato:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/zoho_books_clone/books.css?v=2">
<style>
/* ===== MORE ACTIONS DROPDOWN — FIXED INSIDE VIEWPORT at ≤480px =====
   position:fixed pins the dropdown to the viewport edges.
   This guarantees it never overflows regardless of parent overflow.
   ===================================================== */
@media(max-width:480px){
  /* Hide Preview button — not useful on small screens, saves header space */
  .inv-preview-toggle { display:none !important; }

  /* Compact footer buttons so all 3 fit on one line */
  .add-btn-cancel, .add-btn-draft, .add-btn-more {
    font-size:12px !important;
    padding:8px 10px !important;
    white-space:nowrap !important;
  }

  /* KEY FIX: pin dropdown to viewport using position:fixed */
  .add-btn-more + div,
  div:has(> .add-more-menu-item) {
    position:fixed !important;   /* viewport-relative — never clips */
    left:8px !important;         /* 8px margin from left */
    right:8px !important;        /* 8px margin from right */
    bottom:72px !important;      /* sits above the footer bar (~64px tall) */
    width:auto !important;       /* fill between left and right */
    max-width:none !important;
    z-index:99999 !important;
    border-radius:12px !important;
    box-shadow:0 8px 32px rgba(0,0,0,.18) !important;
  }

  /* Menu items: full width, comfortably tappable */
  .add-more-menu-item {
    width:100% !important;
    font-size:14px !important;
    padding:14px 20px !important;
    white-space:nowrap !important;
    text-align:left !important;
  }
}




/* ===== FILTER PILLS → GRID LAYOUT at ≤480px =====
   The invoice list pills use class "sales-pill" (not "b-pill").
   The compiled Vite CSS sets their container to overflow-x:auto / flex-wrap:nowrap.
   Override: convert to a 3-col grid so all pills are visible at once.
   [All] [Draft] [Unpaid]
   [Overdue] [Paid]
   ===================================================== */
@media(max-width:480px){
  /* Target the container holding sales-pill buttons */
  div:has(> .sales-pill),
  div:has(> button.sales-pill) {
    display:grid !important;
    grid-template-columns:repeat(3, 1fr) !important;
    gap:6px !important;
    overflow-x:visible !important;
    overflow-y:visible !important;
    padding-bottom:0 !important;
    width:100% !important;
    flex-wrap:unset !important;
  }

  /* Each pill: full width of its grid cell, centered text */
  .sales-pill {
    flex-shrink:unset !important;
    width:100% !important;
    text-align:center !important;
    justify-content:center !important;
    padding:7px 6px !important;
    font-size:12px !important;
    white-space:nowrap !important;
  }
}


/* ===== LINE ITEMS → CARD LAYOUT at ≤480px =====
   Inline to bypass browser caching of books.css.
   Uses broad .add-card-body table selector (no :has()) for all browsers.
   Using 480px breakpoint to catch all devices up to 425px CSS pixels.
   ===================================================== */
@media(max-width:480px){
  /* Clip horizontal overflow in content area ONLY — NOT the footer (last child)
     so the More Actions dropdown (position:absolute in footer) can escape. */
  .inv-drawer-panel { overflow-x:visible !important; overflow-y:auto !important; }
  .inv-drawer-panel > *:not(:last-child) { overflow-x:hidden !important; }
  .add-card-body > div { overflow:visible !important; overflow-x:visible !important; }

  /* Hide the column-header row */
  .add-card-body table thead { display:none !important; }

  /* Table and tbody become vertical flex stacks */
  .add-card-body table,
  .add-card-body table tbody {
    display:flex !important;
    flex-direction:column !important;
    gap:10px !important;
    width:100% !important;
    min-width:0 !important;
    overflow:visible !important;
    table-layout:fixed !important;
  }

  /* Every data row becomes a 2-column card */
  .add-card-body table tbody tr {
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    gap:8px !important;
    background:#fff !important;
    border:1.5px solid #e3e8ef !important;
    border-radius:10px !important;
    padding:12px !important;
    box-shadow:0 1px 4px rgba(0,0,0,.07) !important;
    min-width:0 !important;
    width:100% !important;
  }

  /* All cells: flex-column, no border/padding */
  .add-card-body table tbody tr td {
    display:flex !important;
    flex-direction:column !important;
    gap:3px !important;
    padding:0 !important;
    border:none !important;
    font-size:13px !important;
    min-width:0 !important;
  }

  /* Cell 1 (#) – top-left */
  .add-card-body table tbody tr td:nth-child(1) {
    grid-column:1/2 !important;
    flex-direction:row !important;
    align-items:center !important;
    grid-row:1 !important;
  }

  /* Cell 2 (Item) – full width */
  .add-card-body table tbody tr td:nth-child(2) {
    grid-column:1/3 !important;
  }

  /* Last cell (delete) – top-right */
  .add-card-body table tbody tr td:last-child {
    grid-column:2/3 !important;
    flex-direction:row !important;
    align-items:center !important;
    justify-content:flex-end !important;
    grid-row:1 !important;
  }
  .add-card-body table tbody tr td:last-child .add-line-del { opacity:1 !important; }

  /* 2nd-to-last cell (Amount) – full width footer */
  .add-card-body table tbody tr td:nth-last-child(2) {
    grid-column:1/3 !important;
    flex-direction:row !important;
    justify-content:space-between !important;
    align-items:center !important;
    border-top:1px solid #f0f3f7 !important;
    padding-top:8px !important;
    margin-top:4px !important;
    font-weight:700 !important;
    color:#1a1a2e !important;
  }
  .add-card-body table tbody tr td:nth-last-child(2)::before {
    content:'Amount' !important;
    font-size:9.5px !important;
    font-weight:700 !important;
    text-transform:uppercase !important;
    letter-spacing:.05em !important;
    color:#9ca3af !important;
  }

  /* Inputs & selects inside cells: full width */
  .add-card-body table tbody tr td input,
  .add-card-body table tbody tr td select,
  .add-card-body table tbody tr td .ss-trigger {
    width:100% !important;
    font-size:13px !important;
    padding:6px 8px !important;
    box-sizing:border-box !important;
  }

  /* Last row (Add new line): no card */
  .add-card-body table tbody tr:last-child {
    display:block !important;
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    padding:4px 0 !important;
  }
}

@media(max-width:375px){
  .add-card-body > div { overflow:visible !important; }
  .add-card-body table thead { display:none !important; }
  .add-card-body table,
  .add-card-body table tbody {
    display:flex !important;
    flex-direction:column !important;
    gap:8px !important;
    width:100% !important;
    min-width:0 !important;
    overflow:visible !important;
  }
  .add-card-body table tbody tr {
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    gap:6px !important;
    background:#fff !important;
    border:1.5px solid #e3e8ef !important;
    border-radius:10px !important;
    padding:10px !important;
    box-shadow:0 1px 4px rgba(0,0,0,.07) !important;
    min-width:0 !important;
  }
  .add-card-body table tbody tr td {
    display:flex !important;
    flex-direction:column !important;
    gap:3px !important;
    padding:0 !important;
    border:none !important;
    font-size:12.5px !important;
    min-width:0 !important;
  }
  .add-card-body table tbody tr td:nth-child(1){grid-column:1/2 !important;flex-direction:row !important;align-items:center !important;}
  .add-card-body table tbody tr td:nth-child(2){grid-column:1/3 !important;}
  .add-card-body table tbody tr td:last-child{grid-column:2/3 !important;flex-direction:row !important;align-items:center !important;justify-content:flex-end !important;}
  .add-card-body table tbody tr td:last-child .add-line-del{opacity:1 !important;}
  .add-card-body table tbody tr td:nth-last-child(2){grid-column:1/3 !important;flex-direction:row !important;justify-content:space-between !important;align-items:center !important;border-top:1px solid #f0f3f7 !important;padding-top:7px !important;margin-top:3px !important;font-weight:700 !important;color:#1a1a2e !important;}
  .add-card-body table tbody tr td:nth-last-child(2)::before{content:'Amount' !important;font-size:9px !important;font-weight:700 !important;text-transform:uppercase !important;letter-spacing:.05em !important;color:#9ca3af !important;}
  .add-card-body table tbody tr td input,
  .add-card-body table tbody tr td select,
  .add-card-body table tbody tr td .ss-trigger{width:100% !important;font-size:12.5px !important;padding:5px 7px !important;box-sizing:border-box !important;}
  .add-card-body table tbody tr:last-child{display:block !important;background:transparent !important;border:none !important;box-shadow:none !important;padding:3px 0 !important;}
}

/* ===== PAYMENTS TAB TABLE → CARD LAYOUT at ≤480px =====
   Applies to the Payments tab table inside the Invoice VIEW drawer.
   5 columns: Payment #, Date, Mode, Reference, Amount.
   Uses .inv-drawer-panel:not(.is-add) to target view-only drawer.
   Same card approach as the line items table.
   ===================================================== */
@media(max-width:480px){
  /* View drawer: stop overflow-x on the payments table wrapper */
  .inv-drawer-panel:not(.is-add) { overflow-x:hidden !important; }

  /* Payments table: hide headers, become flex stack */
  .inv-drawer-panel:not(.is-add) table {
    display:flex !important;
    flex-direction:column !important;
    width:100% !important;
    min-width:0 !important;
    overflow:visible !important;
  }
  .inv-drawer-panel:not(.is-add) table thead {
    display:none !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody {
    display:flex !important;
    flex-direction:column !important;
    gap:10px !important;
    width:100% !important;
    overflow:visible !important;
  }

  /* Each payment row → card */
  .inv-drawer-panel:not(.is-add) table tbody tr {
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    gap:6px 10px !important;
    background:#fff !important;
    border:1.5px solid #e3e8ef !important;
    border-radius:10px !important;
    padding:12px !important;
    box-shadow:0 1px 4px rgba(0,0,0,.07) !important;
    width:100% !important;
    min-width:0 !important;
  }

  /* All td: flex column, no border/padding */
  .inv-drawer-panel:not(.is-add) table tbody tr td {
    display:flex !important;
    flex-direction:column !important;
    gap:2px !important;
    padding:0 !important;
    border:none !important;
    min-width:0 !important;
    font-size:13px !important;
    overflow:hidden !important;
    text-overflow:ellipsis !important;
    white-space:nowrap !important;
  }

  /* Col 1: Payment # — full width top, blue link */
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(1) {
    grid-column:1/3 !important;
    flex-direction:row !important;
    align-items:center !important;
    font-size:13px !important;
    font-weight:700 !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(1)::before {
    content:'PMT #' !important;
    font-size:9.5px !important;
    font-weight:700 !important;
    text-transform:uppercase !important;
    letter-spacing:.05em !important;
    color:#9ca3af !important;
    margin-right:6px !important;
    flex-shrink:0 !important;
  }

  /* Col 2: Date — left col */
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(2) {
    grid-column:1/2 !important;
    font-size:12px !important;
    color:#6b7280 !important;
    white-space:nowrap !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(2)::before {
    content:'Date' !important;
    font-size:9.5px !important; font-weight:700 !important;
    text-transform:uppercase !important; letter-spacing:.05em !important;
    color:#9ca3af !important;
  }

  /* Col 3: Mode — right col */
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(3) {
    grid-column:2/3 !important;
    font-size:12px !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(3)::before {
    content:'Mode' !important;
    font-size:9.5px !important; font-weight:700 !important;
    text-transform:uppercase !important; letter-spacing:.05em !important;
    color:#9ca3af !important;
  }

  /* Col 4: Reference — full width, muted */
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(4) {
    grid-column:1/3 !important;
    font-size:11px !important;
    color:#9ca3af !important;
    overflow:hidden !important;
    text-overflow:ellipsis !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(4)::before {
    content:'Ref #' !important;
    font-size:9.5px !important; font-weight:700 !important;
    text-transform:uppercase !important; letter-spacing:.05em !important;
    color:#9ca3af !important;
  }

  /* Col 5: Amount — full-width footer, green & bold */
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(5) {
    grid-column:1/3 !important;
    flex-direction:row !important;
    justify-content:space-between !important;
    align-items:center !important;
    border-top:1px solid #f0f3f7 !important;
    padding-top:8px !important;
    margin-top:4px !important;
    font-weight:700 !important;
    font-size:15px !important;
    color:#16a34a !important;
  }
  .inv-drawer-panel:not(.is-add) table tbody tr td:nth-child(5)::before {
    content:'Amount' !important;
    font-size:9.5px !important; font-weight:700 !important;
    text-transform:uppercase !important; letter-spacing:.05em !important;
    color:#9ca3af !important;
  }
}
</style>

<style>
/* ═══════════════════════════════════════════════════════════
   DELIVERY CHALLAN — Items → Card layout (375px & 425px)
   Covers both the NEW/EDIT drawer (dc-item-row)
   and the VIEW drawer (dc-items-tbl table).
   No build needed.
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 480px) {

  /* ══ NEW / EDIT DRAWER: dc-items-head + dc-item-row ══ */

  /* Hide the column header row */
  .dc-items-head {
    display: none !important;
  }

  /* ── Each item row → a card ── */
  .dc-item-row {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: auto auto auto !important;
    background: #fff !important;
    border: 1px solid #e2e8f0 !important;
    border-radius: 12px !important;
    margin: 6px 10px 0 10px !important;
    padding: 12px !important;
    gap: 10px 10px !important;
    box-shadow: 0 1px 4px rgba(0,0,0,.06) !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
  }

  /* ── Row 1: Item (full width, col 1+2) ── */
  .dc-item-row > div:nth-child(1) {
    grid-column: 1 / -1 !important;
    grid-row: 1 !important;
    min-width: 0 !important;
  }
  .dc-item-row > div:nth-child(1)::before {
    content: 'ITEM' !important;
    display: block !important;
    font-size: 9.5px !important;
    font-weight: 700 !important;
    letter-spacing: .06em !important;
    color: #9ca3af !important;
    margin-bottom: 4px !important;
  }

  /* ── Row 2: Description (full width) ── */
  .dc-item-row > div:nth-child(2) {
    grid-column: 1 / -1 !important;
    grid-row: 2 !important;
    min-width: 0 !important;
  }
  .dc-item-row > div:nth-child(2)::before {
    content: 'DESCRIPTION' !important;
    display: block !important;
    font-size: 9.5px !important;
    font-weight: 700 !important;
    letter-spacing: .06em !important;
    color: #9ca3af !important;
    margin-bottom: 4px !important;
  }

  /* ── Row 3: Qty left (col 1) ── */
  .dc-item-row > div:nth-child(3) {
    grid-column: 1 !important;
    grid-row: 3 !important;
    display: flex !important;
    flex-direction: column !important;
    min-width: 0 !important;
  }
  .dc-item-row > div:nth-child(3)::before {
    content: 'QTY' !important;
    display: block !important;
    font-size: 9.5px !important;
    font-weight: 700 !important;
    letter-spacing: .06em !important;
    color: #9ca3af !important;
    margin-bottom: 4px !important;
  }

  /* ── Row 3: UOM right (col 2) — equal 50% width ── */
  .dc-item-row > div:nth-child(4) {
    grid-column: 2 !important;
    grid-row: 3 !important;
    display: flex !important;
    flex-direction: column !important;
    min-width: 0 !important;
  }
  .dc-item-row > div:nth-child(4)::before {
    content: 'UOM' !important;
    display: block !important;
    font-size: 9.5px !important;
    font-weight: 700 !important;
    letter-spacing: .06em !important;
    color: #9ca3af !important;
    margin-bottom: 4px !important;
  }

  /* ── Delete button — bottom right (row 3 col 2, align end) ── */
  .dc-item-row > div:nth-child(5) {
    grid-column: 2 !important;
    grid-row: 2 !important;
    display: flex !important;
    align-items: flex-end !important;
    justify-content: flex-end !important;
    padding-bottom: 0 !important;
  }
  .dc-item-row > div:nth-child(5) .add-line-del {
    opacity: 1 !important;
    background: #fee2e2 !important;
    border-radius: 6px !important;
    padding: 5px 7px !important;
    border: 1px solid #fca5a5 !important;
  }

  /* ── All inputs: full width, no overflow ── */
  .dc-item-row .inv-fi {
    width: 100% !important;
    min-width: 0 !important;
    box-sizing: border-box !important;
    font-size: 13px !important;
    padding: 8px 9px !important;
    border-radius: 7px !important;
  }
  .dc-item-row .inv-fi.ta-r { text-align: left !important; }

  /* SearchableSelect container: prevent overflow */
  .dc-item-row [class*="searchable"],
  .dc-item-row [class*="select-wrap"],
  .dc-item-row .inv-ci {
    min-width: 0 !important;
    width: 100% !important;
    box-sizing: border-box !important;
  }

  /* ── Add new line button: full-width dashed ── */
  .add-new-line-row { padding: 8px 10px 10px !important; }
  .add-new-line-btn {
    width: 100% !important;
    justify-content: center !important;
    padding: 10px !important;
    border: 1.5px dashed #d1d5db !important;
    border-radius: 9px !important;
    font-size: 13px !important;
    color: #2563eb !important;
    background: #f8fafc !important;
  }

  /* ══ VIEW DRAWER: dc-items-tbl ══ */
  .dc-items-tbl thead { display: none !important; }
  .dc-items-tbl,
  .dc-items-tbl tbody { display: block !important; width: 100% !important; }

  .dc-items-tbl tbody tr {
    display: grid !important;
    grid-template-columns: auto 1fr auto !important;
    grid-template-rows: auto auto !important;
    background: #f8fafc !important;
    border: 1px solid #e8edf3 !important;
    border-radius: 10px !important;
    margin-bottom: 8px !important;
    padding: 10px 12px !important;
    gap: 3px 10px !important;
  }

  /* Row number → col 1, row 1+2 */
  .dc-items-tbl tbody tr td:nth-child(1) {
    grid-column: 1 !important; grid-row: 1 / 3 !important;
    display: flex !important; align-items: center !important;
    padding: 0 !important; border: none !important;
    font-size: 12px !important; color: #9ca3af !important;
    font-weight: 700 !important; min-width: 20px !important;
  }

  /* Item name + code → col 2, row 1 */
  .dc-items-tbl tbody tr td:nth-child(2) {
    grid-column: 2 !important; grid-row: 1 !important;
    padding: 0 !important; border: none !important;
  }

  /* Description → col 2, row 2 (full width of col 2+3) */
  .dc-items-tbl tbody tr td:nth-child(3) {
    grid-column: 2 / 4 !important; grid-row: 2 !important;
    padding: 0 !important; border: none !important;
    font-size: 12px !important; color: #6b7280 !important;
  }

  /* Qty → col 3, row 1 (top right) */
  .dc-items-tbl tbody tr td:nth-child(4) {
    grid-column: 3 !important; grid-row: 1 !important;
    padding: 0 !important; border: none !important;
    text-align: right !important;
    font-size: 14px !important; font-weight: 700 !important; color: #111827 !important;
  }

  /* UOM → hidden on view (shown inline after qty) */
  .dc-items-tbl tbody tr td:nth-child(5) {
    display: none !important;
  }

  /* Warehouse → hidden to save space */
  .dc-items-tbl tbody tr td:nth-child(6) {
    display: none !important;
  }

  /* ── 425px ── */
  @media (max-width: 425px) {
    .dc-item-row { margin: 5px 8px !important; padding: 9px 10px !important; gap: 5px 8px !important; }
    .dc-item-row .inv-fi { font-size: 12.5px !important; padding: 6px 8px !important; }
    .dc-items-tbl tbody tr { padding: 9px 10px !important; border-radius: 9px !important; }
  }

  /* ── 375px ── */
  @media (max-width: 375px) {
    .dc-item-row { margin: 4px 8px !important; padding: 8px 9px !important; gap: 4px 6px !important; }
    .dc-item-row .inv-fi { font-size: 12px !important; padding: 6px 7px !important; }
    .dc-items-tbl tbody tr { padding: 8px 9px !important; gap: 2px 8px !important; }
    .dc-items-tbl tbody tr td:nth-child(4) { font-size: 13px !important; }
  }
}
</style>

<style>
/* ═══════════════════════════════════════════════════════════
   DASHBOARD — Top Customers Table → Cards (375px & 425px)
   No build needed.
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 480px) {

  /* Hide the table header */
  .db-table thead { display: none !important; }

  /* Make table + tbody block */
  .db-table,
  .db-table tbody { display: block !important; width: 100% !important; }

  /* Each tr = a customer card */
  .db-table tbody tr {
    display: grid !important;

(function() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const r = 14;
  // Rounded rect background — same color as .bv-sidebar-brand-mark (#2563eb)
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(64-r, 0);
  ctx.arcTo(64,0, 64,r, r); ctx.lineTo(64, 64-r);
  ctx.arcTo(64,64, 64-r,64, r); ctx.lineTo(r, 64);
  ctx.arcTo(0,64, 0,64-r, r); ctx.lineTo(0, r);
  ctx.arcTo(0,0, r,0, r); ctx.closePath();
  ctx.fillStyle = '#2563eb';
  ctx.fill();
  // "B" text
  ctx.fillStyle = '#ffffff';
  ctx.font = '800 40px Inter, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('B', 32, 34);
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png';
  link.href = c.toDataURL('image/png');

<!-- Download dropdown fix — repositions using fixed coords on mobile -->
<script>
(function(){
  if(typeof MutationObserver==='undefined')return;
  var observer=new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(node){
        if(node.nodeType!==1)return;
        // The dropdown is a div sibling after .inv-ab-dropdown
        var btn=node.previousElementSibling;
        if(btn&&btn.classList.contains('inv-ab-dropdown')&&window.innerWidth<=600){
          var rect=btn.getBoundingClientRect();
          node.style.setProperty('position','fixed','important');
          node.style.setProperty('top',(rect.bottom+4)+'px','important');
          node.style.setProperty('left',rect.left+'px','important');
          node.style.setProperty('right','auto','important');
          node.style.setProperty('z-index','99999','important');
        }
      });
    });
  });
  // Start observing once body is ready
  function startObs(){observer.observe(document.body,{childList:true,subtree:true});}
  if(document.body)startObs();
  else document.addEventListener('DOMContentLoaded',startObs);
})();
</script>

<!-- Mobile hamburger — vanilla JS, no Vite rebuild needed -->
<script>
(function(){
  'use strict';
  var BREAK=768,isOpen=false,overlay=null,hamBtn=null,closeBtn=null;
  function mobile(){return window.innerWidth<=BREAK;}
  function openSidebar(){isOpen=true;var a=document.querySelector('.bv-app');if(a)a.classList.add('bv-mobile-open');if(overlay)overlay.style.display='block';document.body.style.overflow='hidden';}
  function closeSidebar(){isOpen=false;var a=document.querySelector('.bv-app');if(a)a.classList.remove('bv-mobile-open');if(overlay)overlay.style.display='none';document.body.style.overflow='';}
  function toggle(e){if(e)e.stopPropagation();if(isOpen)closeSidebar();else openSidebar();}
  function init(){
    var topbar=document.querySelector('.bv-topbar');
    var sidebar=document.querySelector('.bv-sidebar');
    var brand=document.querySelector('.bv-sidebar-brand');
    if(!topbar||!sidebar||!brand)return false;
    if(!document.querySelector('.bv-hamburger')){
      hamBtn=document.createElement('button');
      hamBtn.className='bv-hamburger';
      hamBtn.setAttribute('aria-label','Toggle navigation');
      hamBtn.setAttribute('type','button');
      hamBtn.innerHTML='<span class="bv-ham-icon"></span>';
      hamBtn.addEventListener('click',toggle);
      topbar.insertBefore(hamBtn,topbar.firstChild);
    }
    if(!document.querySelector('.bv-sidebar-close-mob')){
      closeBtn=document.createElement('button');
      closeBtn.className='bv-sidebar-close-mob';
      closeBtn.setAttribute('aria-label','Close menu');
      closeBtn.setAttribute('type','button');
      closeBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      closeBtn.addEventListener('click',function(e){e.stopPropagation();closeSidebar();});
      brand.appendChild(closeBtn);
    }
    if(!overlay){
      overlay=document.createElement('div');
      overlay.className='bv-mob-overlay';
      overlay.style.display='none';
      overlay.addEventListener('click',closeSidebar);
      document.querySelector('.bv-app').appendChild(overlay);

    window.addEventListener('resize',function(){if(!mobile()&&isOpen)closeSidebar();});
    return true;
  }
  var tries=0,timer=setInterval(function(){tries++;if(init()||tries>=120)clearInterval(timer);},100);
})();
</script>
