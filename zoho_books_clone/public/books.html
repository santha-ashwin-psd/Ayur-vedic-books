<style>
/* ═══════════════════════════════════════════════════════════════════
   COLOR-CODED STATUS PILLS — All tabs & pages
   Matches the Zoho Books design: active = solid fill, inactive = colored outline.
   Classes are: pill-{status-key} added dynamically by Vue.
   Works for: Invoices, Quotes, Bills, Recurring, Payments, Sales Orders, etc.
   ═══════════════════════════════════════════════════════════════════ */

/* ── Base pill style ── */
.sales-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s ease;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #374151;
}
.sales-pill:hover { border-color: #cbd5e1; background: #f8fafc; }

/* Active = solid blue (default for "All") */
.sales-pill.active {
  background: #2563eb !important;
  border-color: #2563eb !important;
  color: #fff !important;
}
.sales-pill.active .sales-pill-count {
  background: rgba(255,255,255,.25) !important;
  color: #fff !important;
}

/* Count badge */
.sales-pill-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: #f1f5f9;
  color: #64748b;
}

/* ── Draft / Open / Pending — slate gray ── */
.sales-pill.pill-draft,
.sales-pill.pill-open,
.sales-pill.pill-pending,
.sales-pill.pill-Pending {
  border-color: #94a3b8; color: #475569;
}
.sales-pill.pill-draft:hover, .sales-pill.pill-open:hover,
.sales-pill.pill-pending:hover { background: #f8fafc; }
.sales-pill.pill-draft.active, .sales-pill.pill-open.active,
.sales-pill.pill-pending.active, .sales-pill.pill-Pending.active {
  background: #475569 !important; border-color: #475569 !important;
}

/* ── Sent / Submitted — cyan/teal ── */
.sales-pill.pill-sent,
.sales-pill.pill-Sent {
  border-color: #06b6d4; color: #0891b2;
}
.sales-pill.pill-sent.active, .sales-pill.pill-Sent.active {
  background: #0891b2 !important; border-color: #0891b2 !important;
}

/* ── Accepted / Approved / Completed ── green ── */
.sales-pill.pill-accepted,
.sales-pill.pill-Accepted,
.sales-pill.pill-approved,
.sales-pill.pill-Completed,
.sales-pill.pill-completed {
  border-color: #16a34a; color: #16a34a;
}
.sales-pill.pill-accepted.active, .sales-pill.pill-Accepted.active,
.sales-pill.pill-approved.active, .sales-pill.pill-Completed.active,
.sales-pill.pill-completed.active {
  background: #16a34a !important; border-color: #16a34a !important;
}

/* ── Declined / Cancelled / Rejected — red ── */
.sales-pill.pill-declined,
.sales-pill.pill-Declined,
.sales-pill.pill-cancelled,
.sales-pill.pill-Cancelled,
.sales-pill.pill-rejected,
.sales-pill.pill-overdue,
.sales-pill.pill-Overdue {
  border-color: #dc2626; color: #dc2626;
}

/* ── To Deliver — blue ── */
.sales-pill.pill-toDeliver {
  border-color: #2563eb; color: #2563eb;
}
.sales-pill.pill-toDeliver.active {
  background: #2563eb !important; border-color: #2563eb !important;
}

/* ── Delivered — green ── */
.sales-pill.pill-delivered {
  border-color: #16a34a; color: #16a34a;
}
.sales-pill.pill-delivered.active {
  background: #16a34a !important; border-color: #16a34a !important;
}


.sales-pill.pill-declined.active, .sales-pill.pill-Declined.active,
.sales-pill.pill-cancelled.active, .sales-pill.pill-Cancelled.active,
.sales-pill.pill-rejected.active, .sales-pill.pill-overdue.active,
.sales-pill.pill-Overdue.active {
  background: #dc2626 !important; border-color: #dc2626 !important;
}

/* ── Expired / Paused / On Hold — amber/yellow ── */
.sales-pill.pill-expired,
.sales-pill.pill-Expired,
.sales-pill.pill-paused,
.sales-pill.pill-Paused,
.sales-pill.pill-on_hold {
  border-color: #d97706; color: #b45309;
}
.sales-pill.pill-expired.active, .sales-pill.pill-Expired.active,
.sales-pill.pill-paused.active, .sales-pill.pill-Paused.active,
.sales-pill.pill-on_hold.active {
  background: #d97706 !important; border-color: #d97706 !important;
}

/* ── Converted / Active / Running — purple ── */
.sales-pill.pill-converted,
.sales-pill.pill-Converted {
  border-color: #7c3aed; color: #7c3aed;
}
.sales-pill.pill-converted.active, .sales-pill.pill-Converted.active {
  background: #7c3aed !important; border-color: #7c3aed !important;
}

/* ── Active (Recurring) — green ── */
.sales-pill.pill-Active {
  border-color: #16a34a; color: #16a34a;
}
.sales-pill.pill-Active.active {
  background: #16a34a !important; border-color: #16a34a !important;
}

/* ── Unpaid / Due — orange ── */
.sales-pill.pill-unpaid,
.sales-pill.pill-Unpaid,
.sales-pill.pill-due,
.sales-pill.pill-Due {
  border-color: #ea580c; color: #c2410c;
}
.sales-pill.pill-unpaid.active, .sales-pill.pill-Unpaid.active,
.sales-pill.pill-due.active, .sales-pill.pill-Due.active {
  background: #ea580c !important; border-color: #ea580c !important;
}

/* ── Paid — emerald ── */
.sales-pill.pill-paid,
.sales-pill.pill-Paid {
  border-color: #059669; color: #059669;
}
.sales-pill.pill-paid.active, .sales-pill.pill-Paid.active {
  background: #059669 !important; border-color: #059669 !important;
}

/* ── Ordered / Received ── indigo ── */
.sales-pill.pill-ordered,
.sales-pill.pill-Ordered,
.sales-pill.pill-received,
.sales-pill.pill-Received {
  border-color: #4f46e5; color: #4f46e5;
}
.sales-pill.pill-ordered.active, .sales-pill.pill-Ordered.active,
.sales-pill.pill-received.active, .sales-pill.pill-Received.active {
  background: #4f46e5 !important; border-color: #4f46e5 !important;
}

/* ── v2 ──────────────────────────────────────────────── */

/* Pills container: flex wrap on mobile */
@media(max-width:640px){
  .sales-pills {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 6px !important;
    overflow: visible !important;
    order: 3 !important;       /* pills always last in column toolbar */
  }
  .sales-pill {
    flex-shrink: 0 !important;
    font-size: 12px !important;
    padding: 5px 11px !important;
  }

  /* ── All toolbars: stack as column ── */
  .sales-toolbar {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }

  /* Search bar always first */
  .sales-toolbar .sales-search { order: 1 !important; }

  /* Action bars (sales-actions or the inline div in DC/Recurring) → row 2 */
  .sales-toolbar .sales-actions,
  .sales-toolbar > div:not(.sales-search):not(.sales-pills) {
    order: 2 !important;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: flex-end !important;
    gap: 6px !important;
    margin-left: 0 !important;
    width: 100% !important;
  }

  /* In pages with .sales-actions (Invoices/Quotes/Bills),
     selects fill space and primary button goes below */
  .sales-toolbar .sales-actions {
    flex-wrap: wrap !important;
    justify-content: flex-start !important;
  }
  .sales-toolbar .sales-actions .sales-select {
    flex: 1 1 auto !important;
    min-width: 100px !important;
  }
  .sales-toolbar .sales-actions .sales-btn-primary {
    width: 100% !important;
    justify-content: center !important;
    padding: 12px !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    border-radius: 10px !important;
    order: 10 !important;
  }
}

/* ── 375px tweaks ── */
@media(max-width:375px){
  .sales-pill { font-size: 11.5px !important; padding: 4px 9px !important; }
  .sales-toolbar .sales-actions .sales-btn-primary {
    padding: 11px !important; font-size: 13.5px !important;
  }
}



/* ── INVOICES: colored summary stat cards ── */
/* These use classes: inv-stat-revenue / inv-stat-receivable / inv-stat-average */
/* Replaces the default compact bk-stat-card with large colored-bg cards */



/* Hide the KPI count cards on mobile (replaced by the colored cards below) */

  .bk-kpi-grid { display: none !important; }

  /* Stat grid: single column stacked */
  .inv-mobile-summary.bk-stat-grid {
    display: flex !important;

  }

  }

  /* Hide icon on mobile summary cards */

  /* Label: small uppercase */

    font-size: 11px !important;
    font-weight: 700 !important;

  }

  /* Value: large bold */

  /* ── GREEN — This Month Revenue ── */

  /* Fix value font-size override from inline style */

/* Smaller tweaks at 375px */
@media(max-width:375px){
  .inv-mobile-summary .bk-stat-card { padding: 16px !important; }
  .inv-mobile-summary .bk-stat-value { font-size: 22px !important; }
  .sales-btn-primary { padding: 11px !important; font-size: 13.5px !important; }

/* ═══════════════════════════════════════════════════════════════════

</style>


<style>
/* ===== MORE ACTIONS DROPDOWN — FIXED INSIDE VIEWPORT at ≤480px =====
   position:fixed pins the dropdown to the viewport edges.
   This guarantees it never overflows regardless of parent overflow.
   ===================================================== */
@media(max-width:480px){
  /* Hide Preview button — not useful on small screens, saves header space */
  .inv-preview-toggle { display:none !important; }

  /* Compact footer buttons so all 3 fit on one line */
  .add-btn-cancel, .add-btn-draft, .add-btn-more {
    font-size:12px !important;
    padding:8px 10px !important;
    white-space:nowrap !important;
  }

  /* KEY FIX: pin dropdown to viewport using position:fixed */
  .add-btn-more + div,
  div:has(> .add-more-menu-item) {
    position:fixed !important;   /* viewport-relative — never clips */
    left:8px !important;         /* 8px margin from left */
    right:8px !important;        /* 8px margin from right */
    bottom:72px !important;      /* sits above the footer bar (~64px tall) */
    width:auto !important;       /* fill between left and right */
    max-width:none !important;
    z-index:99999 !important;
    border-radius:12px !important;
    box-shadow:0 8px 32px rgba(0,0,0,.18) !important;
  }

  /* Menu items: full width, comfortably tappable */
  .add-more-menu-item {
    width:100% !important;
    font-size:14px !important;
    padding:14px 20px !important;
    white-space:nowrap !important;
    text-align:left !important;
  }
}




/* ===== FILTER PILLS → GRID LAYOUT at ≤480px =====
   The invoice list pills use class "sales-pill" (not "b-pill").
   The compiled Vite CSS sets their container to overflow-x:auto / flex-wrap:nowrap.
   Override: convert to a 3-col grid so all pills are visible at once.
   [All] [Draft] [Unpaid]
   [Overdue] [Paid]
   ===================================================== */
@media(max-width:480px){
  /* Target the container holding sales-pill buttons */
  div:has(> .sales-pill),
  div:has(> button.sales-pill) {
    display:grid !important;
    grid-template-columns:repeat(3, 1fr) !important;
    gap:6px !important;
    overflow-x:visible !important;
    overflow-y:visible !important;
    padding-bottom:0 !important;
    width:100% !important;
    flex-wrap:unset !important;
  }

  /* Each pill: full width of its grid cell, centered text */
  .sales-pill {
    flex-shrink:unset !important;
    width:100% !important;
    text-align:center !important;
    justify-content:center !important;
    padding:7px 6px !important;
    font-size:12px !important;
    white-space:nowrap !important;
  }
}


/* ===== LINE ITEMS → CARD LAYOUT at ≤480px =====
   Inline to bypass browser caching of books.css.
   Uses broad .add-card-body table selector (no :has()) for all browsers.
   Using 480px breakpoint to catch all devices up to 425px CSS pixels.
   ===================================================== */
@media(max-width:480px){
  /* Clip horizontal overflow in content area ONLY — NOT the footer (last child)
     so the More Actions dropdown (position:absolute in footer) can escape. */
  .inv-drawer-panel { overflow-x:visible !important; overflow-y:auto !important; }
  .inv-drawer-panel > *:not(:last-child) { overflow-x:hidden !important; }
  .add-card-body > div { overflow:visible !important; overflow-x:visible !important; }

  /* Hide the column-header row */
  .add-card-body table thead { display:none !important; }

  /* Table and tbody become vertical flex stacks */
  .add-card-body table,
  .add-card-body table tbody {
    display:flex !important;
    flex-direction:column !important;
    gap:10px !important;
    width:100% !important;
    min-width:0 !important;
    overflow:visible !important;
    table-layout:fixed !important;
  }

  /* Every data row becomes a 2-column card */
  .add-card-body table tbody tr {
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    gap:8px !important;
    background:#fff !important;
    border:1.5px solid #e3e8ef !important;
    border-radius:10px !important;
    padding:12px !important;
    box-shadow:0 1px 4px rgba(0,0,0,.07) !important;
    min-width:0 !important;
    width:100% !important;
  }

  /* All cells: flex-column, no border/padding */
  .add-card-body table tbody tr td {
    display:flex !important;
    flex-direction:column !important;
    gap:3px !important;
    padding:0 !important;
    border:none !important;
    font-size:13px !important;
    min-width:0 !important;
  }

  /* Cell 1 (#) – top-left */
  .add-card-body table tbody tr td:nth-child(1) {
    grid-column:1/2 !important;
    flex-direction:row !important;
    align-items:center !important;
    grid-row:1 !important;
  }

  /* Cell 2 (Item) – full width */
  .add-card-body table tbody tr td:nth-child(2) {
    grid-column:1/3 !important;
  }

  /* Last cell (delete) – top-right */
  .add-card-body table tbody tr td:last-child {
    grid-column:2/3 !important;
    flex-direction:row !important;
    align-items:center !important;
    justify-content:flex-end !important;
    grid-row:1 !important;
  }
  .add-card-body table tbody tr td:last-child .add-line-del { opacity:1 !important; }

  /* 2nd-to-last cell (Amount) – full width footer */
  .add-card-body table tbody tr td:nth-last-child(2) {
    grid-column:1/3 !important;
    flex-direction:row !important;
    justify-content:space-between !important;
    align-items:center !important;
    border-top:1px solid #f0f3f7 !important;
    padding-top:8px !important;
    margin-top:4px !important;
    font-weight:700 !important;
    color:#1a1a2e !important;
  }
  .add-card-body table tbody tr td:nth-last-child(2)::before {
    content:'Amount' !important;
    font-size:9.5px !important;
    font-weight:700 !important;
    text-transform:uppercase !important;
    letter-spacing:.05em !important;
    color:#9ca3af !important;
  }

  /* Inputs & selects inside cells: full width */
  .add-card-body table tbody tr td input,
  .add-card-body table tbody tr td select,
  .add-card-body table tbody tr td .ss-trigger {
    width:100% !important;
    font-size:13px !important;
    padding:6px 8px !important;
    box-sizing:border-box !important;
  }

  /* Last row (Add new line): no card */
  .add-card-body table tbody tr:last-child {
    display:block !important;
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    padding:4px 0 !important;
  }
}

@media(max-width:375px){
  .add-card-body > div { overflow:visible !important; }
  .add-card-body table thead { display:none !important; }

<script>
(function(){
  if(typeof MutationObserver==='undefined')return;
  var observer=new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(node){
        if(node.nodeType!==1)return;
        // The dropdown is a div sibling after .inv-ab-dropdown
        var btn=node.previousElementSibling;
        if(btn&&btn.classList.contains('inv-ab-dropdown')&&window.innerWidth<=600){
          var rect=btn.getBoundingClientRect();
          node.style.setProperty('position','fixed','important');
          node.style.setProperty('top',(rect.bottom+4)+'px','important');
          node.style.setProperty('left',rect.left+'px','important');
          node.style.setProperty('right','auto','important');
          node.style.setProperty('z-index','99999','important');
        }
      });
    });
  });
  // Start observing once body is ready
  function startObs(){observer.observe(document.body,{childList:true,subtree:true});}
  if(document.body)startObs();

})();

  function closeSidebar(){isOpen=false;var a=document.querySelector('.bv-app');if(a)a.classList.remove('bv-mobile-open');if(overlay)overlay.style.display='none';document.body.style.overflow='';}
  function toggle(e){if(e)e.stopPropagation();if(isOpen)closeSidebar();else openSidebar();}
  function init(){
    var topbar=document.querySelector('.bv-topbar');
    var sidebar=document.querySelector('.bv-sidebar');
    var brand=document.querySelector('.bv-sidebar-brand');
    if(!topbar||!sidebar||!brand)return false;
    if(!document.querySelector('.bv-hamburger')){
      hamBtn=document.createElement('button');
      hamBtn.className='bv-hamburger';
      hamBtn.setAttribute('aria-label','Toggle navigation');
      hamBtn.setAttribute('type','button');
      hamBtn.innerHTML='<span class="bv-ham-icon"></span>';
      hamBtn.addEventListener('click',toggle);
      topbar.insertBefore(hamBtn,topbar.firstChild);
    }
    if(!document.querySelector('.bv-sidebar-close-mob')){
      closeBtn=document.createElement('button');
      closeBtn.className='bv-sidebar-close-mob';
      closeBtn.setAttribute('aria-label','Close menu');
      closeBtn.setAttribute('type','button');
      closeBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      closeBtn.addEventListener('click',function(e){e.stopPropagation();closeSidebar();});
      brand.appendChild(closeBtn);
    }
    if(!overlay){
      overlay=document.createElement('div');
      overlay.className='bv-mob-overlay';
      overlay.style.display='none';
      overlay.addEventListener('click',closeSidebar);
      document.querySelector('.bv-app').appendChild(overlay);
    }
    sidebar.addEventListener('click',function(e){var item=e.target.closest('.bv-sidebar-item,.bv-sidebar-logout,.bv-sidebar-user');if(item&&mobile())setTimeout(closeSidebar,80);});
    window.addEventListener('resize',function(){if(!mobile()&&isOpen)closeSidebar();});
    return true;
  }
  var tries=0,timer=setInterval(function(){tries++;if(init()||tries>=120)clearInterval(timer);},100);
})();
</script>
