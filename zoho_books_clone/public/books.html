<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Books</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/zoho_books_clone/books.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0f2f5}
#books-app{height:100vh;width:100vw}
</style>
</head>
<body>
<div id="books-app"></div>
<script>
// All routes are now fully owned by the Vue/Vite bundle.
// The legacy bundle is no longer used. Keep ?legacy=1 as an emergency escape hatch.

window.BOOKS_VUE_ROUTES = ["/"]; // kept for isVueOwned() in nav.js — "/" prefix matches everything
window.frappe = { session: {}, boot: { sysdefaults: { company: "" } } };
window.__booksCompany = "";

(function () {
  var forceLegacy = /[?&]legacy=1\b/.test(window.location.search);

  function appendScript(src) {
    var el = document.createElement("script");
    el.src = src;
    el.async = false;
    document.body.appendChild(el);
  }

  if (forceLegacy) {
    appendScript("https://unpkg.com/vue@3/dist/vue.global.js");
    appendScript("https://unpkg.com/vue-router@4/dist/vue-router.global.js");
    appendScript("/assets/zoho_books_clone/books.js?v=141");
  } else {
    var css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "/assets/zoho_books_clone/js/dist/style.css?v=3";
    document.head.appendChild(css);
    appendScript("/assets/zoho_books_clone/js/books.js?v=3");
  }
})();
</script>
</body>
</html>
