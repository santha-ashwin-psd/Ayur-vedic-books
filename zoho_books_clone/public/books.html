<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Books</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/zoho_books_clone/books.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0f2f5}
#books-app{height:100vh;width:100vw}
</style>
</head>
<body>
<div id="books-app"></div>
<script>
// Cutover loader. Routes listed in BOOKS_VUE_ROUTES are owned by the new
// Vue/Vite bundle (assets/zoho_books_clone/js/books.js). Everything else
// stays on the legacy hand-written SPA at assets/zoho_books_clone/books.js.
//
// To migrate a route to the new bundle: add its prefix to BOOKS_VUE_ROUTES
// and ship. To roll back any single route: remove it from this list. The
// `?legacy=1` query string forces the legacy bundle regardless.
window.BOOKS_VUE_ROUTES = [
  // Phase A: shell only — new bundle owns nothing yet.
];

window.frappe={session:{},boot:{sysdefaults:{company:''}}};
window.__booksCompany='';

(function () {
  function pathFromHash() {
    var h = window.location.hash || "";
    if (h.charAt(0) === "#") h = h.slice(1);
    return h || "/";
  }
  function routeOwnedByVue(p) {
    var owned = window.BOOKS_VUE_ROUTES || [];
    for (var i = 0; i < owned.length; i++) {
      var r = owned[i];
      if (p === r || p.indexOf(r + "/") === 0) return true;
    }
    return false;
  }
  var forceLegacy = /[?&]legacy=1\b/.test(window.location.search);
  var path = pathFromHash();
  var useVue = !forceLegacy && routeOwnedByVue(path);

  // Dynamically-inserted scripts default to async=true, which lets them
  // execute out of order. The legacy bundle requires Vue and VueRouter to
  // be defined before it runs, so we force in-order execution explicitly.
  function appendScript(src) {
    var el = document.createElement("script");
    el.src   = src;
    el.async = false;
    document.body.appendChild(el);
    return el;
  }

  if (useVue) {
    var css = document.createElement("link");
    css.rel  = "stylesheet";
    css.href = "/assets/zoho_books_clone/js/dist/style.css?v=1";
    document.head.appendChild(css);
    appendScript("/assets/zoho_books_clone/js/books.js?v=1");
  } else {
    // Legacy bundle still loads Vue + Router from CDN.
    appendScript("https://unpkg.com/vue@3/dist/vue.global.js");
    appendScript("https://unpkg.com/vue-router@4/dist/vue-router.global.js");
    appendScript("/assets/zoho_books_clone/books.js?v=141");
  }

  // If the user navigates to a route owned by the OTHER bundle within the
  // same session, hash routing alone won't switch bundles — force a reload.
  window.addEventListener("hashchange", function () {
    var nowOwned = routeOwnedByVue(pathFromHash());
    if (nowOwned !== useVue) window.location.reload();
  });
})();
</script>
</body>
</html>
