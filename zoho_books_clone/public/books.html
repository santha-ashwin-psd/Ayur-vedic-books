<link rel="stylesheet" href="/assets/zoho_books_clone/books.css">
<script>
// Generate favicon matching the sidebar brand mark (blue rounded square + "B")
(function() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const r = 14;
  // Rounded rect background — same color as .bv-sidebar-brand-mark (#2563eb)
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(64-r, 0);
  ctx.arcTo(64,0, 64,r, r); ctx.lineTo(64, 64-r);
  ctx.arcTo(64,64, 64-r,64, r); ctx.lineTo(r, 64);
  ctx.arcTo(0,64, 0,64-r, r); ctx.lineTo(0, r);
  ctx.arcTo(0,0, r,0, r); ctx.closePath();
  ctx.fillStyle = '#2563eb';
  ctx.fill();
  // "B" text
  ctx.fillStyle = '#ffffff';
  ctx.font = '800 40px Inter, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('B', 32, 34);
  const link = document.createElement('link');
  link.rel = 'icon'; link.type = 'image/png';
  link.href = c.toDataURL('image/png');
  document.head.appendChild(link);
})();
</script><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0f2f5}
#books-app{height:100vh;width:100vw}
</style>
</head>

<script>

window.frappe = { session: {}, boot: { sysdefaults: { company: "" } } };
window.__booksCompany = "";

(function () {
  var forceLegacy = /[?&]legacy=1\b/.test(window.location.search);

  function appendScript(src) {
    var el = document.createElement("script");
    el.src = src;
    el.async = false;
    document.body.appendChild(el);
  }

  if (forceLegacy) {
    appendScript("https://unpkg.com/vue@3/dist/vue.global.js");
    appendScript("https://unpkg.com/vue-router@4/dist/vue-router.global.js");
    appendScript("/assets/zoho_books_clone/books.js?v=141");
  } else {
    var css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "/assets/zoho_books_clone/js/style.css?v=4";
    document.head.appendChild(css);
    appendScript("/assets/zoho_books_clone/js/books.js?v=4");
  }
})();
</script>
